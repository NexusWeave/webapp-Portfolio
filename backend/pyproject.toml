[tool.commitizen]
name = "cz_conventional_commits"
version = "1.1.0-1" 
version_scheme = "pep440"
version_provider = "commitizen"

[tool.pytest.ini_options]
pythonpath = ["."]

addopts = [
    "--strict-markers",
    "--import-mode=importlib"
]
markers = [ "integration: marker for integration services"]

asyncio_mode = "auto"

[tool.coverage.run]
source = ["."] 
omit = [".venv/*"]


[tool.coverage.report]

show_missing = true