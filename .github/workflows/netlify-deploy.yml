name: Build & Deploy to Netlify (Documentation Branch Only)

on:
  push:
    branches:
      - documentation

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build and Deploy
        run: |
          cd frontend
          npm run deploy
        env:
          # Netlify
          NETLIFY_SITE_ID:  ${{ secrets.NETLIFY_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          
          # TinaCMS
          TINA_BRANCH: "documentation" #${{ secrets.TINA_BRANCH }}
          TINA_TOKEN: "9e88ca4413e8a633b696b61afb3f3fd8b7c4b560" #${{ secrets.TINA_CLIENT_ID }}
          NEXT_PUBLIC_TINA_CLIENT_ID: "db61a396-6aa4-4652-a2fe-945aa8c080b8" #${{ secrets.TINA_CLIENT_ID }}
          
          # App
          NODE_ENV: production
          GOOGLE_CLOUD: ${{ secrets.GOOGLE_CLOUD }}
