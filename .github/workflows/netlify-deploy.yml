name: Build & Deploy to Netlify (Main Branch Only)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_run:
    workflows: ["Netlify Build Check"]
    types:
      - completed
    branches:
      - main

jobs:
  build-and-deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Build and Deploy
        run: |
          cd frontend
          npm run deploy
        env:
          # Netlify
          NETLIFY_SITE_ID:  ${{ secrets.NETLIFY_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          
          # TinaCMS
          TINA_BRANCH: ${{ github.ref_name }}
          TINA_TOKEN:  ${{ secrets.TINA_TOKEN }}
          NEXT_PUBLIC_TINA_CLIENT_ID: ${{ secrets.TINA_CLIENT_ID }}
          
          # App
          NODE_ENV: production
          GOOGLE_CLOUD: ${{ secrets.GOOGLE_CLOUD }}

