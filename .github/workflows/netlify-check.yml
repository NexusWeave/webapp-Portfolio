name: Netlify Build Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_run:
    workflows: ["Release"]
    branches: [ 'main' ]
    types:
      - completed

jobs:
  check-netlify-build:
    name: Verify Netlify Build
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci || npm install

      - name: Verify Build and Generate
        run: |
          cd frontend
          npm run build
          npm run generate
        env:
          TINA_BRANCH: ${{ github.ref_name }}
          TINA_TOKEN:  ${{ secrets.TINA_TOKEN }}
          NEXT_PUBLIC_TINA_CLIENT_ID: ${{ secrets.TINA_CLIENT_ID }}
          NODE_ENV: production
