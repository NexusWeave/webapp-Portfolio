name: Release
on:
  pull_request:
    branches: [ 'main' ]
  workflow_run:
    workflows: ["Application Tests"]
    types:
      - completed
    branches:
      - main

jobs:
  release:
    if: ${{ github.event_name == 'pull_request' && github.event.workflow_run.conclusion == 'success' }}
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Configure Git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git config --global commit.gpgsign false

      - name: Install Semantic Release dependencies
        run: |
          npm install -g semantic-release @semantic-release/github @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/changelog @semantic-release/git

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
