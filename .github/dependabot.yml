version: 2
updates:
  # Automatically update GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"

  # Automatically update npm dependencies at the repository root
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"

  # Automatically update npm dependencies in the frontend Nuxt project
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "monthly"

  # Automatically update pip dependencies in the backend python project using requirements.in
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "monthly"
