services:
  frontend:
    build: ./frontend
    container_name: frontend-container
    env_file:
      - .env
    ports:
      - "3000:3000"
    restart: always

  backend:
    build: ./backend
    container_name: backend-container
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - .:/app

    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONPATH=/app:/app/backend

    restart: always
    